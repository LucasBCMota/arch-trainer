# Database is hosted externally on Neon (permanent free tier). Paste its
# connection string into DATABASE_URL in the Render dashboard at apply time —
# config.py normalizes it to the psycopg3 driver, and migrations run on boot.
services:
  - type: web
    name: arch-trainer
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      # Shared password gating the API — REQUIRED in production so the public URL
      # can't burn your tokens. Render prompts for it at blueprint apply.
      - key: APP_PASSWORD
        sync: false
      # Signs the session cookie; Render generates + persists a strong value.
      - key: SESSION_SECRET
        generateValue: true
      # Set these in the Render dashboard (sync: false = not stored in the blueprint):
      - key: LLM_MODEL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false

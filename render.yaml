# Database is hosted externally on Neon (permanent free tier). Paste its
# connection string into DATABASE_URL in the Render dashboard at apply time —
# config.py normalizes it to the psycopg3 driver, and migrations run on boot.
services:
  - type: web
    name: arch-trainer
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      # ---- Auth0 (server-side login). Set these in the dashboard at apply. ----
      - key: AUTH0_DOMAIN
        sync: false
      - key: AUTH0_CLIENT_ID
        sync: false
      - key: AUTH0_CLIENT_SECRET
        sync: false
      # Your app's public URL, e.g. https://arch-trainer.onrender.com (no trailing slash).
      - key: APP_BASE_URL
        sync: false
      # Comma-separated emails allowed to spend the LLM keys (run AI generation).
      - key: OWNER_EMAILS
        sync: false
      # Signs the session cookie; Render generates + persists a strong value.
      - key: SESSION_SECRET
        generateValue: true
      - key: SESSION_HTTPS_ONLY
        value: "true"
      # Set these in the Render dashboard (sync: false = not stored in the blueprint):
      - key: LLM_MODEL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false

databases:
  - name: arch-trainer-db
    databaseName: arch_trainer
    plan: free

services:
  - type: web
    name: arch-trainer
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: arch-trainer-db
          property: connectionString
      # Set these in the Render dashboard (sync: false = not stored in the blueprint):
      - key: LLM_MODEL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
